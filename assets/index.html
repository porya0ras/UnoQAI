<!DOCTYPE html>
<html>

<head>
    <title>Letta Chat</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }

        textarea {
            width: 100%;
            height: 90px;
            font-size: 16px;
            padding: 10px;
        }

        button {
            margin-top: 10px;
            padding: 10px 18px;
            font-size: 16px;
        }

        #responseBox {
            margin-top: 20px;
            padding: 15px;
            min-height: 120px;
            border: 1px solid #ccc;
            background: #f7f7f7;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>
    <h2>UNO Q Letta Chat</h2>

    <label>Your message</label>
    <textarea id="chatInput" placeholder="Type message..."></textarea>

    <button onclick="sendMessage()">Send</button>

    <h3>Agent Response</h3>
    <div id="responseBox">Waiting...</div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io(`http://${window.location.host}`);

        function sendMessage() {
            const text = document.getElementById("chatInput").value.trim();

            if (!text) {
                return;
            }

            document.getElementById("responseBox").innerText = "Thinking...";

            socket.emit("chat_message", {
                message: text
            });
        }

        socket.on("agent_response", function (data) {
            document.getElementById("responseBox").innerText = data.response;
        });

        socket.on("agent_error", function (data) {
            document.getElementById("responseBox").innerText = "Error: " + data.error;
        });

        socket.on("connect_error", function (error) {
            document.getElementById("responseBox").innerText = "Socket error: " + error.message;
        });
    </script>
</body>

</html>
